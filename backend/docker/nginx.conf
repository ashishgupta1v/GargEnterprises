# ============================================================
# NGINX Configuration — Garg Enterprises Laravel API
# Reverse proxy to PHP-FPM with rate limiting and security headers
# ============================================================

# Rate limiting zone (200 req/min per client IP)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=200r/m;

# Login-specific rate limiting (5 attempts per 15 minutes per IP)
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

server {
    listen 80;
    server_name api.gargenterprises.in localhost;
    root /var/www/html/public;
    index index.php;

    # ── Security Headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Client Upload Size (for Excel imports and photos) ──
    client_max_body_size 50M;

    # ── Gzip Compression ──
    gzip on;
    gzip_types application/json text/plain application/javascript text/css;
    gzip_min_length 1000;

    # ── Health Check ──
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ── Login Rate Limiting ──
    location = /v1/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── API Routes ──
    location / {
        limit_req zone=api_limit burst=50 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM Processing ──
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # ── Deny dotfiles access ──
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Static file caching ──
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
