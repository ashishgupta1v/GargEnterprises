# ============================================================
# Garg Enterprises Phase 1 — Docker Compose
# Services: App (PHP-FPM), NGINX, Redis, MeiliSearch, PostgreSQL
# ============================================================
services:
  # ── Laravel API (PHP-FPM) ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ge_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      - APP_ENV=${APP_ENV:-local}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-garg_enterprises}
      - DB_USERNAME=${DB_USERNAME:-garg_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_KEY=${MEILISEARCH_KEY:-masterKey}
    depends_on:
      - postgres
      - redis
      - meilisearch
    networks:
      - ge_network

  # ── NGINX Reverse Proxy ──
  nginx:
    image: nginx:1.25-alpine
    container_name: ge_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
      - "${NGINX_SSL_PORT:-8443}:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ge_network

  # ── PostgreSQL 16 ──
  postgres:
    image: postgres:16-alpine
    container_name: ge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-garg_enterprises}
      POSTGRES_USER: ${DB_USERNAME:-garg_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${PG_PORT:-5432}:5432"
    networks:
      - ge_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-garg_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 (Cache + Queue + Sessions) ──
  redis:
    image: redis:7-alpine
    container_name: ge_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - ge_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MeiliSearch 1.7 (Typo-Tolerant Search Engine) ──
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: ge_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-masterKey}
      MEILI_ENV: ${MEILI_ENV:-development}
    volumes:
      - meili_data:/meili_data
    ports:
      - "${MEILI_PORT:-7700}:7700"
    networks:
      - ge_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Queue Worker (Laravel Horizon / Queue) ──
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ge_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      - APP_ENV=${APP_ENV:-local}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-garg_enterprises}
      - DB_USERNAME=${DB_USERNAME:-garg_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MEILISEARCH_HOST=http://meilisearch:7700
    depends_on:
      - app
      - redis
      - postgres
    networks:
      - ge_network

  # ── Scheduler (Laravel CRON — runs AlertEngineCommand daily at 6 AM) ──
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ge_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      - APP_ENV=${APP_ENV:-local}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-garg_enterprises}
      - DB_USERNAME=${DB_USERNAME:-garg_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
    depends_on:
      - app
      - redis
      - postgres
    networks:
      - ge_network

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
  meili_data:
    driver: local

networks:
  ge_network:
    driver: bridge
